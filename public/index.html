<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundialito - Torneo Intercolegial</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>⚽ Mundialito</h1>
        <nav>
            <button id="btn-nav-posiciones">Posiciones</button>
            <button id="btn-nav-goleadores">Goleadores</button>
            <button id="btn-nav-partidos">Partidos</button>
            <button id="btn-nav-admin" class="admin-btn">Panel Admin</button>
        </nav>
    </header>

    <main>
        <section id="vista-posiciones" class="vista-activa">
            <h2>Tabla de Posiciones</h2>
            <div class="table-container">
                <table id="tabla-posiciones">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Equipo</th>
                            <th>PJ</th>
                            <th>PG</th>
                            <th>PE</th>
                            <th>PP</th>
                            <th>GF</th>
                            <th>GC</th>
                            <th>DG</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody id="body-posiciones">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="vista-goleadores" class="vista-oculta">
            <h2>Tabla de Goleadores</h2>
            <div class="table-container">
                <table id="tabla-goleadores">
                    <thead>
                        <tr>
                            <th>Jugador</th>
                            <th>Equipo</th>
                            <th>Goles</th>
                        </tr>
                    </thead>
                    <tbody id="body-goleadores">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="vista-partidos" class="vista-oculta">
            <h2>Calendario de Partidos</h2>
            <div id="contenedor-partidos" class="grid-partidos">
                </div>
        </section>

        <section id="vista-admin" class="vista-oculta">
            <h2>Panel de Administración</h2>
            
            <div id="admin-login">
                <h3>Acceso Restringido</h3>
                <input type="email" id="admin-email" placeholder="Correo electrónico">
                <input type="password" id="admin-pass" placeholder="Contraseña">
                <button id="btn-login">Ingresar</button>
            </div>

            <div id="admin-controles" class="vista-oculta">
                <div class="admin-card">
                    <h3>Registrar Equipo</h3>
                    <input type="text" id="nuevo-equipo-nombre" placeholder="Nombre del equipo (Ej: Grado 10A)">
                    <button id="btn-guardar-equipo">Guardar Equipo</button>
                </div>

                <div class="admin-card">
                    <h3>Registrar Jugador</h3>
                    <input type="text" id="nuevo-jugador-nombre" placeholder="Nombre del jugador">
                    <select id="select-equipo-jugador">
                        <option value="">Selecciona un equipo...</option>
                        </select>
                    <button id="btn-guardar-jugador">Guardar Jugador</button>
                </div>

                <div class="admin-card">
                    <h3>Programar Partido</h3>
                    <select id="select-local">
                        <option value="">Equipo Local</option>
                    </select>
                    <span> VS </span>
                    <select id="select-visitante">
                        <option value="">Equipo Visitante</option>
                    </select>
                    <input type="datetime-local" id="fecha-partido">
                    <button id="btn-programar-partido">Programar</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
