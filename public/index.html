<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Beth Shalom - Interclases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .tab-btn.active { border-bottom: 3px solid #10b981; color: #10b981; }
        #loading-screen {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Pantalla de Carga / Error -->
    <div id="loading-screen">
        <div id="loader-icon" class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mb-4"></div>
        <p id="loading-text" class="text-gray-600 font-medium px-6 text-center">Iniciando sistema...</p>
        <div id="error-actions" class="hidden mt-6 flex flex-col gap-3">
            <button onclick="location.reload()" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg">Intentar de nuevo</button>
            <p id="debug-info" class="text-[10px] text-gray-400 mt-4 font-mono"></p>
        </div>
    </div>

    <!-- Navegación -->
    <header class="bg-green-700 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold flex items-center gap-2">🏆 Beth Shalom</h1>
            <nav class="flex gap-1 bg-green-800 rounded-lg p-1">
                <button onclick="app.switchTab('standings')" id="btn-standings" class="tab-btn px-4 py-2 rounded-md font-medium active text-sm">Posiciones</button>
                <button onclick="app.switchTab('matches')" id="btn-matches" class="tab-btn px-4 py-2 rounded-md font-medium text-sm">Calendario</button>
                <button onclick="app.switchTab('teams')" id="btn-teams" class="tab-btn px-4 py-2 rounded-md font-medium text-sm">Equipos</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
        <section id="view-standings" class="view">
            <div class="bg-white rounded-xl shadow-md p-6 overflow-x-auto border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Clasificación</h2>
                <table class="w-full text-sm text-left">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 uppercase font-bold border-b">
                            <th class="p-3 text-center w-12">#</th>
                            <th class="p-3">Equipo</th>
                            <th class="p-3 text-center">PJ</th>
                            <th class="p-3 text-center text-green-700">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                        <tr><td colspan="4" class="p-10 text-center text-gray-400 italic">No hay datos para mostrar.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="view-matches" class="view hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Partidos</h2>
                <button onclick="app.generateRounds()" class="admin-only bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Generar Fechas</button>
            </div>
            <div id="rounds-container" class="space-y-4"></div>
        </section>

        <section id="view-teams" class="view hidden">
            <div class="admin-only bg-white p-6 rounded-xl shadow-md mb-8">
                <h3 class="font-bold mb-4">Añadir Equipo</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-team-name" placeholder="Nombre..." class="flex-grow p-3 border rounded-xl">
                    <button onclick="app.addTeam()" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold">Añadir</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="teams-list"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white/90 border-t p-4 flex justify-between items-center z-40">
        <span class="text-[10px] text-gray-400">Torneo Interclases © 2024</span>
        <button onclick="app.showLogin()" id="btn-login" class="text-xs font-bold text-green-700 px-3 py-1 bg-green-50 rounded-full border border-green-200">Admin</button>
        <button onclick="app.logout()" id="btn-logout" class="hidden text-xs font-bold text-red-600 px-3 py-1 bg-red-50 rounded-full border border-red-200">Salir</button>
    </footer>

    <div id="login-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full mx-4">
            <h2 class="text-xl font-bold mb-4 text-center">Acceso Restringido</h2>
            <input type="password" id="pass-input" placeholder="Clave Maestra" class="w-full p-4 border rounded-2xl mb-4 text-center">
            <button onclick="app.login()" class="w-full bg-green-700 text-white py-4 rounded-2xl font-bold">Entrar</button>
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="w-full mt-2 text-gray-400 text-xs">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const App = {
            db: null, auth: null, masterPass: "",
            teams: [], rounds: [], isAdmin: false,

            init: async function() {
                try {
                    const res = await fetch('/api/get-config');
                    const config = await res.json();
                    
                    if (config.error) {
                        this.showError(config.message);
                        return;
                    }

                    this.masterPass = config.masterPassword;
                    const firebaseApp = initializeApp(config);
                    this.auth = getAuth(firebaseApp);
                    this.db = getFirestore(firebaseApp);

                    onAuthStateChanged(this.auth, (user) => {
                        if (user) {
                            if (!user.isAnonymous) this.setAdminUI(true);
                            this.syncData();
                        } else {
                            signInAnonymously(this.auth).catch(console.error);
                        }
                    });
                } catch (e) {
                    this.showError("Error de conexión con el backend.");
                }
            },

            syncData: function() {
                onSnapshot(doc(this.db, "torneo", "actual"), (snap) => {
                    document.getElementById('loading-screen').classList.add('hidden');
                    if (snap.exists()) {
                        const data = snap.data();
                        this.teams = data.teams || [];
                        this.rounds = data.rounds || [];
                    }
                    this.render();
                }, (err) => {
                    this.showError("Error de permisos en Firebase.");
                });
            },

            showError: (msg) => {
                document.getElementById('loading-text').innerHTML = `<span class="text-red-600">${msg}</span>`;
                document.getElementById('loader-icon').classList.add('hidden');
                document.getElementById('error-actions').classList.remove('hidden');
                document.getElementById('debug-info').innerText = "Check Vercel Env Vars";
            },

            setAdminUI: function(val) {
                this.isAdmin = val;
                document.body.classList.toggle('is-admin', val);
                document.getElementById('btn-login').classList.toggle('hidden', val);
                document.getElementById('btn-logout').classList.toggle('hidden', !val);
            },

            showLogin: () => document.getElementById('login-modal').classList.remove('hidden'),
            
            login: function() {
                if (document.getElementById('pass-input').value === this.masterPass) {
                    this.setAdminUI(true);
                    document.getElementById('login-modal').classList.add('hidden');
                } else alert("Incorrecto");
            },

            logout: () => { signOut(this.auth); location.reload(); },

            addTeam: async function() {
                const name = document.getElementById('new-team-name').value.trim();
                if (name) {
                    this.teams.push({ name, pj:0, g:0, e:0, p:0, pts:0 });
                    document.getElementById('new-team-name').value = "";
                    await this.save();
                }
            },

            save: async function() {
                if (!this.isAdmin) return;
                try {
                    await setDoc(doc(this.db, "torneo", "actual"), {
                        teams: this.teams, rounds: this.rounds, updated: Date.now()
                    });
                } catch (e) { alert("Error al guardar: " + e.message); }
            },

            render: function() {
                const sBody = document.getElementById('standings-body');
                if (this.teams.length) {
                    const sorted = [...this.teams].sort((a,b) => b.pts - a.pts);
                    sBody.innerHTML = sorted.map((t, i) => `
                        <tr class="border-b">
                            <td class="p-3 text-center font-bold text-gray-300">${i+1}</td>
                            <td class="p-3 font-bold">${t.name}</td>
                            <td class="p-3 text-center">${t.pj}</td>
                            <td class="p-3 text-center font-bold text-green-600">${t.pts}</td>
                        </tr>
                    `).join('');
                }

                const tList = document.getElementById('teams-list');
                tList.innerHTML = this.teams.map(t => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 font-bold uppercase text-xs text-gray-600">${t.name}</div>
                `).join('');
            },

            switchTab: (tab) => {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById(`view-${tab}`).classList.remove('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`btn-${tab}`).classList.add('active');
            }
        };

        window.app = App;
        App.init();
    </script>
</body>
</html>
