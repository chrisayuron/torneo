<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Beth Shalom - Interclases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .tab-btn.active { border-bottom: 3px solid #10b981; color: #10b981; }
        #loading-screen {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Pantalla de Carga -->
    <div id="loading-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mb-4"></div>
        <p id="loading-text" class="text-gray-600 font-medium">Cargando aplicación...</p>
        <button id="emergency-btn" onclick="location.reload()" class="hidden mt-4 text-xs text-blue-500 underline">¿Tarda demasiado? Recargar</button>
    </div>

    <!-- Navegación -->
    <header class="bg-green-700 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">🏆 Beth Shalom</h1>
            <nav class="flex gap-1 bg-green-800 rounded-lg p-1">
                <button onclick="app.switchTab('standings')" id="btn-standings" class="tab-btn px-4 py-2 rounded-md font-medium active text-sm">Posiciones</button>
                <button onclick="app.switchTab('matches')" id="btn-matches" class="tab-btn px-4 py-2 rounded-md font-medium text-sm">Calendario</button>
                <button onclick="app.switchTab('teams')" id="btn-teams" class="tab-btn px-4 py-2 rounded-md font-medium text-sm">Equipos</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
        <!-- VISTA: POSICIONES -->
        <section id="view-standings" class="view">
            <div class="bg-white rounded-xl shadow-md p-6 overflow-x-auto">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Tabla de Posiciones</h2>
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left bg-gray-50 text-gray-500 uppercase font-bold border-b">
                            <th class="p-3 text-center">#</th>
                            <th class="p-3">Equipo</th>
                            <th class="p-3 text-center">PJ</th>
                            <th class="p-3 text-center">G</th>
                            <th class="p-3 text-center">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body"></tbody>
                </table>
            </div>
        </section>

        <!-- VISTA: CALENDARIO -->
        <section id="view-matches" class="view hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Jornadas</h2>
                <button onclick="app.generateRounds()" class="admin-only bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Generar Calendario</button>
            </div>
            <div id="rounds-container" class="space-y-6 text-center text-gray-400 py-10">
                Aún no hay partidos programados.
            </div>
        </section>

        <!-- VISTA: EQUIPOS -->
        <section id="view-teams" class="view hidden">
            <div class="admin-only bg-white p-6 rounded-xl shadow-md mb-8">
                <h3 class="font-bold mb-4">Gestión de Equipos</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-team-name" placeholder="Nombre del equipo..." class="flex-grow p-2 border rounded-lg">
                    <button onclick="app.addTeam()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">Añadir</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="teams-list"></div>
        </section>
    </main>

    <!-- Footer / Admin -->
    <footer class="fixed bottom-0 left-0 w-full bg-white border-t p-4 flex justify-between items-center">
        <span class="text-xs text-gray-400">Beth Shalom v2.1</span>
        <div id="admin-controls">
            <button onclick="app.showLogin()" id="btn-login" class="text-xs font-bold text-green-700 bg-green-50 px-4 py-2 rounded-full border">🔐 Admin</button>
            <button onclick="app.logout()" id="btn-logout" class="hidden text-xs font-bold text-red-600 bg-red-50 px-4 py-2 rounded-full border">Salir</button>
        </div>
    </footer>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[60]">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full mx-4">
            <h2 class="text-xl font-bold mb-4">Acceso Admin</h2>
            <input type="password" id="pass-input" placeholder="Contraseña Maestra" class="w-full p-3 border rounded-xl mb-4 text-center">
            <button onclick="app.login()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Entrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        function App() {
            this.db = null; this.auth = null; this.masterPass = "";
            this.teams = []; this.rounds = []; this.isAdmin = false;

            this.init = async function() {
                console.log("1. Iniciando aplicación...");
                try {
                    const res = await fetch('/api/get-config');
                    const config = await res.json();
                    console.log("2. Configuración recibida:", config.status);

                    if (config.error) {
                        document.getElementById('loading-text').innerText = "Error: " + config.message;
                        return;
                    }

                    this.masterPass = config.masterPassword;
                    const firebaseApp = initializeApp(config);
                    this.auth = getAuth(firebaseApp);
                    this.db = getFirestore(firebaseApp);

                    onAuthStateChanged(this.auth, (user) => {
                        console.log("3. Estado de Auth cambiado:", user ? "Conectado" : "Desconectado");
                        if (user && !user.isAnonymous) this.setAdminUI(true);
                        else if (!user) signInAnonymously(this.auth);
                        
                        this.syncData();
                    });
                    
                    // Botón de emergencia si tarda mucho
                    setTimeout(() => document.getElementById('emergency-btn').classList.remove('hidden'), 5000);

                } catch (e) {
                    console.error("Fallo crítico en init:", e);
                    document.getElementById('loading-text').innerText = "Error al conectar con el servidor.";
                }
            };

            this.syncData = function() {
                console.log("4. Escuchando base de datos...");
                const docRef = doc(this.db, "torneo", "actual");
                
                onSnapshot(docRef, (snap) => {
                    console.log("5. Datos recibidos de Firestore:", snap.exists());
                    document.getElementById('loading-screen').classList.add('hidden');
                    
                    if (snap.exists()) {
                        const data = snap.data();
                        this.teams = data.teams || [];
                        this.rounds = data.rounds || [];
                        this.render();
                    } else {
                        console.warn("Documento 'actual' no existe. El Admin debe inicializar.");
                        this.render(); // Renderiza vacío para quitar estados previos
                    }
                }, (err) => {
                    console.error("Error Firestore:", err);
                    alert("Error al leer datos. Verifica las reglas de Firebase.");
                });
            };

            this.setAdminUI = function(val) {
                this.isAdmin = val;
                document.body.classList.toggle('is-admin', val);
                document.getElementById('btn-login').classList.toggle('hidden', val);
                document.getElementById('btn-logout').classList.toggle('hidden', !val);
            };

            this.showLogin = () => document.getElementById('login-modal').classList.remove('hidden');
            this.login = function() {
                if (document.getElementById('pass-input').value === this.masterPass) {
                    this.setAdminUI(true);
                    document.getElementById('login-modal').classList.add('hidden');
                } else alert("Incorrecto");
            };
            this.logout = () => { this.setAdminUI(false); signOut(this.auth); };

            this.addTeam = async function() {
                const name = document.getElementById('new-team-name').value.trim();
                if (name) {
                    this.teams.push({ name, pj:0, g:0, e:0, p:0, gf:0, gc:0, dg:0, pts:0 });
                    document.getElementById('new-team-name').value = "";
                    await this.save();
                }
            };

            this.save = async function() {
                if (!this.isAdmin) return;
                try {
                    await setDoc(doc(this.db, "torneo", "actual"), {
                        teams: this.teams,
                        rounds: this.rounds,
                        updatedAt: new Date().toISOString()
                    });
                    console.log("Datos guardados.");
                } catch (e) { alert("Error al guardar: " + e.message); }
            };

            this.render = function() {
                // Tabla
                const sBody = document.getElementById('standings-body');
                sBody.innerHTML = this.teams.length ? this.teams.map((t, i) => `
                    <tr class="border-b">
                        <td class="p-3 text-center">${i+1}</td>
                        <td class="p-3 font-bold">${t.name}</td>
                        <td class="p-3 text-center">${t.pj || 0}</td>
                        <td class="p-3 text-center">${t.g || 0}</td>
                        <td class="p-3 text-center font-bold text-green-600">${t.pts || 0}</td>
                    </tr>
                `).join('') : '<tr><td colspan="5" class="p-10 text-center text-gray-400 italic">No hay equipos registrados aún.</td></tr>';

                // Lista de equipos
                const tList = document.getElementById('teams-list');
                tList.innerHTML = this.teams.map(t => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500 flex justify-between">
                        <span class="font-bold">${t.name}</span>
                    </div>
                `).join('');
            };

            this.switchTab = (tab) => {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById(`view-${tab}`).classList.remove('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`btn-${tab}`).classList.add('active');
            };
        }

        window.app = new App();
        app.init();
    </script>
</body>
</html>
