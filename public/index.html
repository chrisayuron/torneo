<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundialito Beth Shalom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        #loading-overlay {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="loading-overlay">
        <div id="spinner" class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-600 mb-4"></div>
        <p id="status-text" class="text-gray-500 text-sm font-medium px-4 text-center">Iniciando sistema...</p>
        <div id="debug-info" class="mt-4 text-[10px] text-gray-300 font-mono hidden"></div>
    </div>

    <header class="bg-green-800 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold italic">🏆 MUNDIALITO</h1>
            <nav class="flex gap-4 text-xs font-bold uppercase tracking-wider">
                <button onclick="app.setTab('posiciones')" class="hover:text-green-300">Posiciones</button>
                <button onclick="app.setTab('equipos')" class="hover:text-green-300">Equipos</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-4xl">
        <section id="view-posiciones" class="view-content">
            <div class="bg-white rounded-2xl shadow-sm border p-6">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-gray-400 border-b uppercase text-[10px]">
                            <th class="py-3 px-2">#</th>
                            <th class="py-3">Equipo</th>
                            <th class="py-3 text-center">PJ</th>
                            <th class="py-3 text-center text-green-700 font-bold">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="4" class="py-10 text-center text-gray-400">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="view-equipos" class="view-content hidden">
            <div class="admin-only bg-white rounded-2xl shadow-sm border p-6 mb-6">
                <div class="flex gap-2">
                    <input type="text" id="input-team" placeholder="Nombre equipo..." class="flex-1 p-3 border rounded-xl outline-none">
                    <button onclick="app.addNewTeam()" class="bg-green-600 text-white px-6 rounded-xl font-bold">Añadir</button>
                </div>
            </div>
            <div id="teams-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 w-full bg-white/95 border-t p-3 flex justify-between items-center px-6">
        <p class="text-[10px] text-gray-400 font-mono uppercase" id="db-status">v2.1 - Desconectado</p>
        <button onclick="app.openLogin()" id="login-trigger" class="text-xs font-bold text-green-700">Admin</button>
        <button onclick="app.logout()" id="logout-trigger" class="hidden text-xs font-bold text-red-600">Salir</button>
    </footer>

    <div id="modal-login" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[110]">
        <div class="bg-white p-8 rounded-3xl w-full max-w-xs shadow-2xl">
            <h2 class="text-lg font-bold mb-4 text-center">Acceso Admin</h2>
            <input type="password" id="field-pass" placeholder="Clave Maestra" class="w-full p-4 border rounded-2xl mb-4 text-center">
            <button onclick="app.handleLogin()" class="w-full bg-green-700 text-white py-4 rounded-2xl font-bold">Entrar</button>
            <button onclick="document.getElementById('modal-login').classList.add('hidden')" class="w-full mt-2 text-gray-400 text-xs">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const app = {
            db: null, auth: null, pass: "", data: { teams: [] }, isAdmin: false,

            init: async function() {
                this.updateStatus("Obteniendo configuración...");
                try {
                    // Intentamos obtener la config de la API
                    const res = await fetch('/api/get-config');
                    
                    if (!res.ok) {
                        const errorData = await res.json().catch(() => ({}));
                        throw new Error(errorData.details || `Error del servidor (${res.status})`);
                    }
                    
                    const config = await res.json();
                    
                    if (config.error) {
                        throw new Error(config.details || "Error en la configuración recibida");
                    }

                    this.pass = config.masterPassword;
                    const fApp = initializeApp(config);
                    this.auth = getAuth(fApp);
                    this.db = getFirestore(fApp);

                    this.updateStatus("Autenticando...");
                    onAuthStateChanged(this.auth, (user) => {
                        if (user) {
                            if (!user.isAnonymous) this.setAdminState(true);
                            this.startSync();
                        } else {
                            signInAnonymously(this.auth).catch(err => {
                                this.showCriticalError("Error Auth: Habilita 'Anonymous' en Firebase Console.");
                            });
                        }
                    });

                } catch (e) {
                    this.showCriticalError(e.message);
                }
            },

            startSync: function() {
                this.updateStatus("Sincronizando base de datos...");
                onSnapshot(doc(this.db, "torneo", "data"), (snap) => {
                    const loader = document.getElementById('loading-overlay');
                    if (loader) loader.classList.add('hidden');
                    
                    const dbStatus = document.getElementById('db-status');
                    if (dbStatus) dbStatus.innerText = "ONLINE: MUNDIALITO-7ED91";
                    
                    this.data = snap.exists() ? snap.data() : { teams: [] };
                    this.render();
                }, (error) => {
                    console.error("Firebase Error:", error);
                    this.updateStatus("Error de Permisos: Revisa las reglas de Firestore.");
                    const dbStatus = document.getElementById('db-status');
                    if (dbStatus) dbStatus.innerText = "ERROR DE REGLAS";
                });
            },

            render: function() {
                const sorted = [...(this.data.teams || [])].sort((a,b) => (b.pts||0) - (a.pts||0));
                const tbody = document.getElementById('table-body');
                if (tbody) {
                    tbody.innerHTML = sorted.length > 0 ? sorted.map((t, i) => `
                        <tr class="border-b hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-2 font-bold text-gray-300">${i+1}</td>
                            <td class="py-4 font-bold text-xs uppercase text-gray-700">${t.name}</td>
                            <td class="py-4 text-center font-medium">${t.pj||0}</td>
                            <td class="py-4 text-center font-bold text-green-600">${t.pts||0}</td>
                        </tr>
                    `).join('') : '<tr><td colspan="4" class="py-10 text-center text-gray-400 italic">No hay equipos registrados.</td></tr>';
                }
                
                const grid = document.getElementById('teams-grid');
                if (grid) {
                    grid.innerHTML = (this.data.teams || []).length > 0 ? (this.data.teams || []).map(t => `
                        <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center">
                            <span class="font-bold text-xs uppercase text-gray-600">${t.name}</span>
                            <div class="w-2 h-2 rounded-full bg-green-400"></div>
                        </div>
                    `).join('') : '<p class="col-span-full text-center text-gray-400 py-10 italic">Usa el modo Admin para gestionar equipos.</p>';
                }
            },

            addNewTeam: async function() {
                const nameInput = document.getElementById('input-team');
                const name = nameInput ? nameInput.value.trim() : "";
                if (!name || !this.isAdmin) return;
                
                this.data.teams = this.data.teams || [];
                this.data.teams.push({ name, pj:0, g:0, e:0, p:0, pts:0 });
                
                try {
                    await setDoc(doc(this.db, "torneo", "data"), {
                        teams: this.data.teams,
                        lastUpdate: Date.now()
                    });
                    if (nameInput) nameInput.value = "";
                } catch (e) {
                    alert("Error al guardar: Revisa las Reglas de Firestore.");
                }
            },

            setAdminState: function(s) {
                this.isAdmin = s;
                document.body.classList.toggle('is-admin', s);
                const loginTrig = document.getElementById('login-trigger');
                const logoutTrig = document.getElementById('logout-trigger');
                if (loginTrig) loginTrig.classList.toggle('hidden', s);
                if (logoutTrig) logoutTrig.classList.toggle('hidden', !s);
            },

            handleLogin: function() {
                const passInput = document.getElementById('field-pass');
                if (passInput && passInput.value === this.pass) {
                    this.setAdminState(true);
                    const modal = document.getElementById('modal-login');
                    if (modal) modal.classList.add('hidden');
                    passInput.value = "";
                } else alert("Clave Incorrecta");
            },

            updateStatus: (m) => {
                const el = document.getElementById('status-text');
                if (el) el.innerText = m;
            },

            showCriticalError: function(m) {
                this.updateStatus("");
                const el = document.getElementById('status-text');
                if (el) el.innerHTML = `<div class="bg-red-50 text-red-600 p-4 rounded-xl border border-red-100 font-bold">Error Crítico:<br><span class="text-xs font-normal">${m}</span></div>`;
                const spinner = document.getElementById('spinner');
                if (spinner) spinner.classList.add('hidden');
            },

            openLogin: () => {
                const modal = document.getElementById('modal-login');
                if (modal) {
                    modal.classList.remove('hidden');
                    document.getElementById('field-pass').focus();
                }
            },
            logout: () => { signOut(app.auth); location.reload(); },
            setTab: (t) => {
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
                const view = document.getElementById(`view-${t}`);
                if (view) view.classList.remove('hidden');
            }
        };

        window.app = app;
        app.init();
    </script>
</body>
</html>
