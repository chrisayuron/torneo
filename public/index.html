<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Beth Shalom - Interclases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .tab-btn.active { border-bottom: 3px solid #10b981; color: #10b981; }
        #loading-screen {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Pantalla de Carga -->
    <div id="loading-screen">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mb-4"></div>
        <p id="loading-text" class="text-gray-600 font-medium">Conectando con el servidor...</p>
        <button id="emergency-btn" onclick="app.forceCloseLoading()" class="hidden mt-4 text-xs text-blue-500 underline font-bold">Omitir carga (Forzar entrada)</button>
    </div>

    <!-- Navegación -->
    <header class="bg-green-700 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">🏆 Beth Shalom</h1>
            <nav class="flex gap-1 bg-green-800 rounded-lg p-1">
                <button onclick="app.switchTab('standings')" id="btn-standings" class="tab-btn px-4 py-2 rounded-md font-medium active text-sm">Posiciones</button>
                <button onclick="app.switchTab('matches')" id="btn-matches" class="tab-btn px-4 py-2 rounded-md font-medium text-sm">Calendario</button>
                <button onclick="app.switchTab('teams')" id="btn-teams" class="tab-btn px-4 py-2 rounded-md font-medium text-sm">Equipos</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">
        <!-- VISTA: POSICIONES -->
        <section id="view-standings" class="view">
            <div class="bg-white rounded-xl shadow-md p-6 overflow-x-auto">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Tabla de Posiciones</h2>
                <table class="w-full text-sm text-left">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 uppercase font-bold border-b">
                            <th class="p-3 text-center">#</th>
                            <th class="p-3">Equipo</th>
                            <th class="p-3 text-center">PJ</th>
                            <th class="p-3 text-center">G</th>
                            <th class="p-3 text-center text-green-700">PTS</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                        <tr><td colspan="5" class="p-10 text-center text-gray-400 italic">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- VISTA: CALENDARIO -->
        <section id="view-matches" class="view hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">Calendario de Jornadas</h2>
                <button onclick="app.generateRounds()" class="admin-only bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-sm">Generar Fechas</button>
            </div>
            <div id="rounds-container" class="space-y-6">
                <p class="text-center text-gray-400 py-10">No hay partidos programados.</p>
            </div>
        </section>

        <!-- VISTA: EQUIPOS -->
        <section id="view-teams" class="view hidden">
            <div class="admin-only bg-white p-6 rounded-xl shadow-md mb-8 border-t-4 border-green-600">
                <h3 class="font-bold mb-4 text-gray-700">Añadir Nuevo Equipo</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-team-name" placeholder="Nombre (ej: 11-A)" class="flex-grow p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    <button onclick="app.addTeam()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl font-bold transition-colors">Añadir</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="teams-list"></div>
        </section>
    </main>

    <!-- Footer / Admin -->
    <footer class="fixed bottom-0 left-0 w-full bg-white border-t p-4 flex justify-between items-center z-40">
        <span class="text-xs text-gray-400 font-medium">Torneo Beth Shalom © 2024</span>
        <div id="admin-controls">
            <button onclick="app.showLogin()" id="btn-login" class="text-xs font-bold text-green-700 bg-green-50 px-4 py-2 rounded-full border border-green-200 hover:bg-green-100 transition-all">🔐 Admin Access</button>
            <button onclick="app.logout()" id="btn-logout" class="hidden text-xs font-bold text-red-600 bg-red-50 px-4 py-2 rounded-full border border-red-200 hover:bg-red-100 transition-all">Cerrar Sesión</button>
        </div>
    </footer>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full mx-4 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-gray-800 text-center">Panel Admin</h2>
            <p class="text-gray-500 text-center text-sm mb-6">Ingresa la contraseña maestra</p>
            <input type="password" id="pass-input" placeholder="••••••••" class="w-full p-4 border rounded-2xl mb-4 text-center text-xl tracking-widest focus:ring-2 focus:ring-green-500 outline-none">
            <button onclick="app.login()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-green-200 transition-all">Ingresar Ahora</button>
            <button onclick="document.getElementById('login-modal').classList.add('hidden')" class="w-full mt-4 text-gray-400 text-sm font-medium">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        function App() {
            this.db = null; this.auth = null; this.masterPass = "";
            this.teams = []; this.rounds = []; this.isAdmin = false;

            this.init = async function() {
                console.log("Iniciando App...");
                try {
                    // 1. Obtener config desde el servidor Vercel
                    const res = await fetch('/api/get-config');
                    const config = await res.json();
                    
                    if (config.error) {
                        this.handleFatalError("Error de Servidor: " + config.message);
                        return;
                    }

                    this.masterPass = config.masterPassword;
                    const firebaseApp = initializeApp(config);
                    this.auth = getAuth(firebaseApp);
                    this.db = getFirestore(firebaseApp);

                    // 2. Gestionar sesión anónima o admin
                    onAuthStateChanged(this.auth, (user) => {
                        console.log("Auth Status:", user ? (user.isAnonymous ? "Anónimo" : "Identificado") : "Nadie");
                        if (user) {
                            if (!user.isAnonymous) this.setAdminUI(true);
                            this.syncData();
                        } else {
                            signInAnonymously(this.auth).catch(e => console.error("Error Auth:", e));
                        }
                    });
                    
                    // Mostrar botón de emergencia después de 6 segundos
                    setTimeout(() => {
                        const btn = document.getElementById('emergency-btn');
                        if (btn) btn.classList.remove('hidden');
                    }, 6000);

                } catch (e) {
                    this.handleFatalError("Error de conexión inicial.");
                    console.error(e);
                }
            };

            this.syncData = function() {
                console.log("Escuchando base de datos...");
                const docRef = doc(this.db, "torneo", "actual");
                
                onSnapshot(docRef, (snap) => {
                    this.forceCloseLoading();
                    if (snap.exists()) {
                        const data = snap.data();
                        this.teams = data.teams || [];
                        this.rounds = data.rounds || [];
                        console.log("Datos cargados correctamente.");
                    } else {
                        console.warn("La base de datos está vacía.");
                        this.teams = []; this.rounds = [];
                    }
                    this.render();
                }, (err) => {
                    console.error("Error Firestore:", err);
                    this.forceCloseLoading();
                    this.render(); // Mostrar interfaz vacía para que no se vea el spinner
                });
            };

            this.forceCloseLoading = () => {
                const screen = document.getElementById('loading-screen');
                if (screen) screen.classList.add('hidden');
            };

            this.handleFatalError = (msg) => {
                const text = document.getElementById('loading-text');
                if (text) text.innerText = msg;
                this.forceCloseLoading();
            };

            this.setAdminUI = function(val) {
                this.isAdmin = val;
                document.body.classList.toggle('is-admin', val);
                document.getElementById('btn-login').classList.toggle('hidden', val);
                document.getElementById('btn-logout').classList.toggle('hidden', !val);
            };

            this.showLogin = () => {
                document.getElementById('login-modal').classList.remove('hidden');
                document.getElementById('pass-input').focus();
            };

            this.login = function() {
                const pass = document.getElementById('pass-input').value;
                if (pass === this.masterPass) {
                    this.setAdminUI(true);
                    document.getElementById('login-modal').classList.add('hidden');
                    document.getElementById('pass-input').value = "";
                } else {
                    alert("Contraseña Incorrecta");
                }
            };

            this.logout = () => {
                this.setAdminUI(false);
                signOut(this.auth);
                location.reload();
            };

            this.addTeam = async function() {
                const input = document.getElementById('new-team-name');
                const name = input.value.trim();
                if (name) {
                    this.teams.push({ 
                        name, pj:0, g:0, e:0, p:0, gf:0, gc:0, dg:0, pts:0 
                    });
                    input.value = "";
                    await this.save();
                }
            };

            this.save = async function() {
                if (!this.isAdmin) return;
                try {
                    await setDoc(doc(this.db, "torneo", "actual"), {
                        teams: this.teams,
                        rounds: this.rounds,
                        lastUpdate: new Date().getTime()
                    });
                } catch (e) {
                    alert("No tienes permisos para escribir en la DB. Revisa las Reglas de Firebase.");
                }
            };

            this.render = function() {
                // Render Tabla
                const sBody = document.getElementById('standings-body');
                if (this.teams.length === 0) {
                    sBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-400 italic">No hay equipos registrados. Accede como Admin para empezar.</td></tr>';
                } else {
                    const sorted = [...this.teams].sort((a,b) => (b.pts || 0) - (a.pts || 0));
                    sBody.innerHTML = sorted.map((t, i) => `
                        <tr class="border-b hover:bg-gray-50 transition-colors">
                            <td class="p-4 text-center font-bold text-gray-400">${i+1}</td>
                            <td class="p-4 font-bold text-gray-800">${t.name}</td>
                            <td class="p-4 text-center">${t.pj || 0}</td>
                            <td class="p-4 text-center">${t.g || 0}</td>
                            <td class="p-4 text-center font-bold text-green-600">${t.pts || 0}</td>
                        </tr>
                    `).join('');
                }

                // Render Equipos
                const tList = document.getElementById('teams-list');
                tList.innerHTML = this.teams.length ? this.teams.map(t => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-green-500 flex justify-between items-center group">
                        <span class="font-bold text-gray-700 uppercase">${t.name}</span>
                        <div class="text-[10px] text-gray-300 font-bold">ACTIVO</div>
                    </div>
                `).join('') : '<p class="col-span-full text-center text-gray-400 italic py-10">Esperando creación de equipos...</p>';
            };

            this.switchTab = (tab) => {
                document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
                document.getElementById(`view-${tab}`).classList.remove('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`btn-${tab}`).classList.add('active');
            };
        }

        window.app = new App();
        app.init();
    </script>
</body>
</html>
